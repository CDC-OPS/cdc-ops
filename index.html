// Live listener: polls Firebase every intervalMs and fires callback only when data actually changes.
// Returns a handle with .close() to stop and .markLocal(data) to suppress the next echo of our own write.
// We pause when the user is actively typing in any input/textarea on the page so live updates don't clobber typing.
function fwatch(p,callback,intervalMs){
  intervalMs=intervalMs||5000;
  var lastJson='__init__',stopped=false,inFlight=false;
  function poll(){
    if(stopped||inFlight)return;
    // Pause if user is actively editing an input/textarea anywhere
    var ae=document.activeElement;
    if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT'))return;
    inFlight=true;
    fetch(FB+p+'.json').then(function(r){return r.json();}).then(function(data){
      inFlight=false;
      if(stopped)return;
      var j=JSON.stringify(data||null);
      if(j!==lastJson){lastJson=j;callback(data);}
    }).catch(function(){inFlight=false;});
  }
  poll();
  var id=setInterval(poll,intervalMs);
  return{
    close:function(){stopped=true;clearInterval(id);},
    markLocal:function(d){try{lastJson=JSON.stringify(d||null);}catch(e){}}
  };
}

function exportMonthlyRoles(toast){

  var daysInMonth=new Date(y,m+1,0).getDate();
  var dayKeys=[];
  for(var d=1;d<=daysInMonth;d++){dayKeys.push(getDayKey(new Date(y,m,d)));}
  Promise.all(dayKeys.map(function(k){return Promise.all([fg('/cdc_ops/days/'+k+'/shiftDist/Night'),fg('/cdc_ops/days/'+k+'/shiftDist/Morning'),fg('/cdc_ops/days/'+k+'/shiftDist/Middle')]).then(function(r){return{key:k,Night:r[0]?toArr(r[0]):[],Morning:r[1]?toArr(r[1]):[],Middle:r[2]?toArr(r[2]):[]};});})).then(function(allDays){
    if(!window.XLSX){toast('XLSX not loaded','error');return;}
    var XL=window.XLSX,wb=XL.utils.book_new();
    var monthLabel=now.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    function findEntry(dayData,code){var shifts=['Night','Morning','Middle'];for(var i=0;i<shifts.length;i++){var s=shifts[i],row=dayData[s].filter(function(r){return r.code==+code;})[0];if(row)return{role:row.role,shift:s,routes:row.routes||'',onBreak:row.onBreak};}return null;}
    // Sheet 1: Per-day cells showing "Shift / Routes" for each staff member
    var hdrs=['Code','Name'];
    for(var d=1;d<=daysInMonth;d++)hdrs.push(String(d).padStart(2,'0'));
    var rows=[hdrs];
    STAFF.forEach(function(s){
      var row=[s.code,s.name];
      allDays.forEach(function(dd){
        var info=findEntry(dd,s.code);
        if(!info)row.push('');
        else{
          // Show shift initial + routes (or just shift+role if Supervisor)
          var shInit=info.shift.charAt(0); // N / M / Mi (we'll use full name in cell)
          if(info.role==='Supervisor'){row.push(info.shift+' (Sup)');}

    var ws=XL.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:8},{wch:24}].concat(dayKeys.map(function(){return{wch:18};}));

    // Sheet 2: Per-day, per-shift breakdown — one row per dispatcher with their routes

    allDays.forEach(function(dd){

      });
    });
    var ws2=XL.utils.aoa_to_sheet(detailRows);

    XL.utils.book_append_sheet(wb,ws2,'Daily Detail');

    // Sheet 3: Routes coverage matrix - which dispatcher covered each route per day
    var routeHdrs=['Route'];
    for(var dd2=1;dd2<=daysInMonth;dd2++)routeHdrs.push(String(dd2).padStart(2,'0'));
    var routeRows=[routeHdrs];
    ROUTES.forEach(function(rt){
      var rline=[rt];
      allDays.forEach(function(dd){
        var coverers=[];
        ['Night','Morning','Middle'].forEach(function(sh){
          dd[sh].forEach(function(r){
            if(r.role!=='Dispatcher'||!r.name)return;
            var routes=(r.routes||'').split(',').map(function(x){return x.trim();}).filter(Boolean);
            if(routes.indexOf(rt)>=0){coverers.push(sh.charAt(0)+':'+r.name);}
          });
        });

      routeRows.push(rline);

    ws3['!cols']=[{wch:8}].concat(dayKeys.map(function(){return{wch:24};}));
    XL.utils.book_append_sheet(wb,ws3,'Route Coverage');

    var legend=XL.utils.aoa_to_sheet([['Sheet','Meaning'],['Routes by Day','Per staff: shift name + routes handled (or "Sup" if supervisor)'],['Daily Detail','One row per assignment with full routes list'],['Route Coverage','Per route: which dispatcher covered it each day (N/M/Mi prefix = shift)'],['(blank)','Not assigned that day']]);
    legend['!cols']=[{wch:18},{wch:60}];
    XL.utils.book_append_sheet(wb,legend,'Legend');
    XL.writeFile(wb,'CDC_Monthly_Roles_'+monthLabel.replace(/ /g,'_')+'.xlsx');
    toast('Monthly export done','success');
  });
}

function parseDataFile(file,cb){
  var name=(file.name||'').toLowerCase();
  function postProcess(arr){
    if(!arr.length){cb(null,{headers:[],rows:[]});return;}
    var firstRow=arr[0];
    // Detect headerless single-column bus list: 1 col + first cell looks like a bus number (MS#### / MA####)
    var isSingleColBusList=firstRow&&firstRow.length===1&&/^(MS|MA)\d{3,4}$/i.test(String(firstRow[0]||'').trim());
    var headers,startIdx;
    if(isSingleColBusList){
      headers=['busnumber'];startIdx=0;
    }else{
      headers=firstRow.map(function(h){return String(h||'').trim().toLowerCase();});
      startIdx=1;
    }
    var rows=[];
    for(var i=startIdx;i<arr.length;i++){
      var row=arr[i],o={};
      if(!row||!row.some(function(c){return String(c||'').trim();}))continue;
      headers.forEach(function(h,j){o[h]=String(row[j]||'').trim();});
      rows.push(o);
    }
    cb(null,{headers:headers,rows:rows});
  }
  if(name.endsWith('.csv')){
    var rd=new FileReader();
    rd.onload=function(){try{
      var text=rd.result.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
      var lines=text.split('\n').filter(function(l){return l.trim();});
      function splitLine(l){var out=[],cur='',inQ=false;for(var i=0;i<l.length;i++){var c=l[i];if(c==='"'){if(inQ&&l[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}else if(c===','&&!inQ){out.push(cur);cur='';}else{cur+=c;}}out.push(cur);return out.map(function(s){return s.trim();});}
      var arr=lines.map(splitLine);
      postProcess(arr);
    }catch(e){cb(e);}};
    rd.onerror=function(){cb(new Error('Read failed'));};
    rd.readAsText(file);
  }else if(name.endsWith('.xlsx')||name.endsWith('.xls')){
    if(!window.XLSX){cb(new Error('XLSX library not loaded'));return;}
    var rd2=new FileReader();
    rd2.onload=function(){try{
      var wb=window.XLSX.read(new Uint8Array(rd2.result),{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var arr=window.XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
      postProcess(arr);
    }catch(e){cb(e);}};
    rd2.onerror=function(){cb(new Error('Read failed'));};
    rd2.readAsArrayBuffer(file);
  }else{cb(new Error('Unsupported file type. Use .csv, .xlsx, or .xls'));}
}

  var lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(function(l){return l.trim();});
  if(!lines.length)return{headers:[],rows:[]};
  function splitLine(l){var out=[],cur='',inQ=false;for(var i=0;i<l.length;i++){var c=l[i];if(c==='"'){if(inQ&&l[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}else if(c===','&&!inQ){out.push(cur);cur='';}else{cur+=c;}}out.push(cur);return out.map(function(s){return s.trim();});}
  var headers=splitLine(lines[0]).map(function(h){return h.toLowerCase();}),rows=[];
  for(var i=1;i<lines.length;i++){var v=splitLine(lines[i]),o={};headers.forEach(function(h,j){o[h]=v[j]||'';});rows.push(o);}
